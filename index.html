<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS Student Builder Group – Photo Booth</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("5Axz1Ne_iY6Kie-94");</script>
  <style>
    /* ── RESET & BASE ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --bg2:       #16213e;
      --magenta:   #bf40bf;
      --magenta2:  #9b30c4;
      --purple:    #7b2fff;
      --white:     #ffffff;
      --grid-col:  rgba(191,64,191,0.10);
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Amazon Ember', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--grid-col) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      background: rgba(26,26,46,0.92);
      border-bottom: 2px solid var(--magenta);
      backdrop-filter: blur(8px);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-left img { height: 38px; }
    .header-title h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .04em; }
    .header-title p  { font-size: 0.72rem; color: var(--magenta); letter-spacing: .08em; }
    .header-right img { height: 30px; opacity: .9; }

    /* ── CHECKERBOARD ACCENT BLOCKS ──────────────────────────── */
    .checker-strip {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      height: 28px;
      position: relative; z-index: 5;
    }
    .checker-strip .cell { height: 100%; }
    .checker-strip .cell.filled { background: var(--magenta); }

    /* ── MAIN LAYOUT ─────────────────────────────────────────── */
    .app {
      position: relative; z-index: 5;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      gap: 20px;
      padding: 24px 20px;
      min-height: calc(100vh - 130px);
    }

    /* ── PANELS (sticker columns) ────────────────────────────── */
    .panel {
      background: rgba(22,33,62,0.85);
      border: 1px solid rgba(191,64,191,0.3);
      border-radius: var(--radius);
      padding: 14px 10px;
      display: flex; flex-direction: column; gap: 10px;
      backdrop-filter: blur(6px);
      max-height: 80vh;
      overflow-y: auto;
    }
    .panel h3 {
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: .12em; color: var(--magenta);
      text-align: center; padding-bottom: 8px;
      border-bottom: 1px solid rgba(191,64,191,0.25);
    }
    .sticker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .sticker-btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(191,64,191,0.35);
      border-radius: 8px;
      padding: 6px 4px 5px;
      cursor: pointer;
      transition: border-color .2s, transform .15s, background .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 80px;
    }
    .sticker-btn:hover {
      border-color: var(--magenta);
      background: rgba(191,64,191,0.2);
      transform: scale(1.07);
    }
    .sticker-btn img {
      width: 56px; height: 56px;
      object-fit: contain;
      display: block;
      /* checkerboard background so transparent PNGs are visible */
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
      border-radius: 4px;
    }
    .sticker-btn.ito img {
      width: 52px; height: 52px;
      border-radius: 6px;
    }
    /* label under each sticker button */
    .sticker-btn span {
      display: block;
      font-size: 0.58rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-top: 3px;
      line-height: 1.2;
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── CENTER CANVAS AREA ──────────────────────────────────── */
    .canvas-area {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    #stage {
      position: relative;
      width: 540px; max-width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      border-radius: var(--radius);
      border: 2px solid rgba(191,64,191,0.4);
      overflow: hidden;
      cursor: crosshair;
    }
    #stage video, #stage canvas#photo-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    /* Frame overlay */
    #frame-overlay {
      position: absolute; inset: 0; z-index: 20;
      pointer-events: none;
      display: none;
    }
    .frame-border {
      position: absolute; inset: 0;
      border: 4px solid rgba(255,255,255,0.9);
      border-radius: 4px;
    }
    .frame-label {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem; font-weight: 700;
      color: #fff; letter-spacing: .06em;
      text-shadow: 0 1px 4px rgba(0,0,0,.7);
      white-space: nowrap;
    }
    .frame-sbg-logo {
      position: absolute; bottom: 10px; left: 12px;
      height: 36px;
    }
    .frame-aws-logo {
      position: absolute; top: 8px; right: 10px;
      height: 28px;
    }
    /* AWS watermark always visible */
    #aws-watermark {
      position: absolute; bottom: 14px; right: 14px;
      z-index: 30; height: 36px;
      pointer-events: none;
      opacity: 0.92;
      display: none;
    }

    /* ── DRAGGABLE STICKERS ON STAGE ─────────────────────────── */
    .placed-sticker {
      position: absolute; z-index: 25;
      cursor: grab; user-select: none;
      touch-action: none;
    }
    .placed-sticker:active { cursor: grabbing; }
    .placed-sticker img { width: 80px; height: 80px; object-fit: contain; display: block; }
    .placed-sticker .delete-btn {
      position: absolute; top: -8px; right: -8px;
      background: var(--magenta); color: #fff;
      border: none; border-radius: 50%; width: 20px; height: 20px;
      font-size: 12px; cursor: pointer; line-height: 20px; text-align: center;
      display: none;
    }
    .placed-sticker:hover .delete-btn { display: block; }
    .placed-sticker .resize-handle {
      position: absolute; bottom: -6px; right: -6px;
      width: 14px; height: 14px;
      background: var(--magenta); border-radius: 50%;
      cursor: se-resize; display: none;
    }
    .placed-sticker:hover .resize-handle { display: block; }

    /* ── PLACEHOLDER (before camera) ────────────────────────── */
    #placeholder {
      position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: linear-gradient(135deg, #1a1a2e 60%, #2d1b4e);
    }
    #placeholder svg { opacity: .3; }
    #placeholder p { color: rgba(255,255,255,.4); font-size: .9rem; }

    /* ── CONTROLS ────────────────────────────────────────────── */
    .controls {
      display: flex; flex-wrap: wrap;
      gap: 10px; justify-content: center;
    }
    .btn {
      padding: 10px 22px; border-radius: 8px;
      font-size: 0.88rem; font-weight: 700;
      letter-spacing: .04em; cursor: pointer;
      border: none; transition: transform .15s, opacity .2s;
    }
    .btn:active { transform: scale(.96); }
    .btn-primary {
      background: var(--magenta);
      color: #fff;
      box-shadow: 0 4px 18px rgba(191,64,191,.45);
    }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary {
      background: transparent;
      color: var(--magenta);
      border: 2px solid var(--magenta);
    }
    .btn-secondary:hover { background: rgba(191,64,191,.12); }
    .btn-download {
      background: linear-gradient(135deg, var(--magenta), var(--purple));
      color: #fff;
      box-shadow: 0 4px 18px rgba(123,47,255,.4);
    }
    .btn-danger {
      background: transparent;
      color: #e05; border: 2px solid #e05;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── EMAIL BUTTON ────────────────────────────────────────── */
    .btn-send {
      background: linear-gradient(135deg, #16213e, #1a1a2e);
      color: var(--magenta);
      border: 2px solid var(--magenta);
      box-shadow: 0 4px 18px rgba(191,64,191,.25);
    }
    .btn-send:hover { background: rgba(191,64,191,.15); }

    /* ── MODAL OVERLAY ───────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,20,.85);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1.5px solid var(--magenta);
      border-radius: 18px;
      padding: 36px 32px;
      width: min(460px, 92vw);
      box-shadow: 0 24px 64px rgba(191,64,191,.35);
      position: relative;
    }
    .modal h2 {
      color: var(--magenta); font-size: 1.2rem;
      margin-bottom: 6px; letter-spacing: .04em;
    }
    .modal p { font-size: .82rem; color: rgba(255,255,255,.55); margin-bottom: 22px; }
    .modal label { display: block; font-size: .8rem; color: rgba(255,255,255,.65);
                   margin-bottom: 4px; }
    .modal input[type=text],
    .modal input[type=email] {
      width: 100%; padding: 10px 14px;
      background: rgba(26,26,46,.9);
      border: 1.5px solid rgba(191,64,191,.35);
      border-radius: 8px; color: #fff; font-size: .92rem;
      margin-bottom: 16px; outline: none;
      transition: border-color .2s;
    }
    .modal input:focus { border-color: var(--magenta); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: rgba(255,255,255,.4);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: #fff; }
    .send-status {
      font-size: .8rem; text-align: center; margin-top: 10px;
      min-height: 20px; letter-spacing: .03em;
    }
    .send-status.ok  { color: #4cff91; }
    .send-status.err { color: #ff4c6a; }

    /* ── FRAME TOGGLE ────────────────────────────────────────── */
    .frame-toggle-wrap {
      display: flex; align-items: center; gap: 10px;
      font-size: .8rem; color: rgba(255,255,255,.6);
    }
    .toggle { appearance: none; width: 36px; height: 20px;
      background: rgba(191,64,191,.25); border-radius: 10px;
      cursor: pointer; position: relative; transition: background .2s; }
    .toggle:checked { background: var(--magenta); }
    .toggle::after { content: ''; position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; border-radius: 50%; background: #fff;
      transition: left .2s; }
    .toggle:checked::after { left: 19px; }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .panel { flex-direction: row; max-height: none; overflow-x: auto;
               overflow-y: visible; flex-wrap: wrap; }
      .sticker-grid { grid-template-columns: repeat(4,1fr); }
      #stage { width: 100%; }
    }
  </style>
</head>

  <script>
  /* ===== STATE ================================================= */
  const state = {
    streaming: false,
    photoTaken: false,
    stickers: [],          // { el, x, y, w, h, src }
    activeSticker: null,
    dragOffset: { x: 0, y: 0 },
    resizing: false,
    resizeStart: { x: 0, y: 0, w: 0, h: 0 }
  };

  /* ===== DOM REFS ============================================== */
  const video      = document.getElementById('video');
  const photoCanvas= document.getElementById('photo-canvas');
  const stage      = document.getElementById('stage');
  const placeholder= document.getElementById('placeholder');
  const frameOverlay = document.getElementById('frame-overlay');
  const awsWatermark = document.getElementById('aws-watermark');
  const toggleFrame  = document.getElementById('toggle-frame');
  const btnOpenCam = document.getElementById('btn-open-cam');
  const btnSnap    = document.getElementById('btn-snap');
  const btnRetake  = document.getElementById('btn-retake');
  const btnDownload= document.getElementById('btn-download');
  const btnClear   = document.getElementById('btn-clear');

  /* ===== CAMERA =============================================== */
  btnOpenCam.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 1280 } },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      state.streaming = true;
      btnSnap.disabled = false;
      btnOpenCam.disabled = true;
    } catch (e) {
      alert('No se pudo acceder a la cámara: ' + e.message);
    }
  });

  btnSnap.addEventListener('click', () => {
    const s = stage.clientWidth;
    photoCanvas.width  = s;
    photoCanvas.height = s;
    const ctx = photoCanvas.getContext('2d');
    ctx.drawImage(video, 0, 0, s, s);
    photoCanvas.style.display = 'block';
    video.style.display = 'none';
    // Stop stream
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    state.streaming = false;
    state.photoTaken = true;
    awsWatermark.style.display = 'block';
    btnSnap.disabled = true;
    btnRetake.disabled = false;
    btnDownload.disabled = false;
    btnClear.disabled = false;
  });

  btnRetake.addEventListener('click', () => {
    photoCanvas.style.display = 'none';
    placeholder.style.display = 'flex';
    awsWatermark.style.display = 'none';
    state.photoTaken = false;
    // Remove placed stickers
    document.querySelectorAll('.placed-sticker').forEach(el => el.remove());
    state.stickers = [];
    btnRetake.disabled = true;
    btnDownload.disabled = true;
    btnClear.disabled = true;
    btnOpenCam.disabled = false;
    btnSnap.disabled = true;
  });

  btnClear.addEventListener('click', () => {
    document.querySelectorAll('.placed-sticker').forEach(el => el.remove());
    state.stickers = [];
  });
  </script>

  <script>
  /* ===== FRAME TOGGLE ========================================= */
  toggleFrame.addEventListener('change', () => {
    frameOverlay.style.display = toggleFrame.checked ? 'block' : 'none';
  });

  /* ===== ADD STICKER ========================================== */
  document.querySelectorAll('.sticker-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!state.photoTaken) return;
      addSticker(btn.dataset.src);
    });
  });

  function addSticker(src) {
    const el = document.createElement('div');
    el.className = 'placed-sticker';
    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;
    const size = Math.round(stageW * 0.18);
    el.style.left = (stageW / 2 - size / 2) + 'px';
    el.style.top  = (stageH / 2 - size / 2) + 'px';
    el.style.width  = size + 'px';
    el.style.height = size + 'px';

    const img = document.createElement('img');
    img.src = src;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.objectFit = 'contain';
    img.draggable = false;

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.innerHTML = '×';
    del.addEventListener('click', (e) => { e.stopPropagation(); el.remove(); });

    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';

    el.appendChild(img);
    el.appendChild(del);
    el.appendChild(resizeHandle);
    stage.appendChild(el);

    makeDraggable(el, resizeHandle);
  }

  /* ===== DRAG ================================================= */
  function makeDraggable(el, handle) {
    // Drag
    el.addEventListener('pointerdown', (e) => {
      if (e.target === handle) return; // handled separately
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      const stageRect = stage.getBoundingClientRect();
      state.activeSticker = el;
      state.dragOffset.x = e.clientX - rect.left;
      state.dragOffset.y = e.clientY - rect.top;
      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener('pointermove', (e) => {
      if (state.activeSticker !== el || state.resizing) return;
      const stageRect = stage.getBoundingClientRect();
      let nx = e.clientX - stageRect.left - state.dragOffset.x;
      let ny = e.clientY - stageRect.top  - state.dragOffset.y;
      nx = Math.max(0, Math.min(stageRect.width  - el.offsetWidth,  nx));
      ny = Math.max(0, Math.min(stageRect.height - el.offsetHeight, ny));
      el.style.left = nx + 'px';
      el.style.top  = ny + 'px';
    });

    el.addEventListener('pointerup', () => { state.activeSticker = null; });

    // Resize
    handle.addEventListener('pointerdown', (e) => {
      e.stopPropagation(); e.preventDefault();
      state.resizing = true;
      state.resizeStart = {
        x: e.clientX, y: e.clientY,
        w: el.offsetWidth, h: el.offsetHeight
      };
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener('pointermove', (e) => {
      if (!state.resizing) return;
      const dx = e.clientX - state.resizeStart.x;
      const newSize = Math.max(40, state.resizeStart.w + dx);
      el.style.width  = newSize + 'px';
      el.style.height = newSize + 'px';
    });
    handle.addEventListener('pointerup', () => { state.resizing = false; });
  }
  </script>

  <script>
  /* ===== DOWNLOAD (flatten to canvas) ======================== */
  // Download uses the shared flattenToBase64 (defined in next script block)
  btnDownload.addEventListener('click', async () => {
    const dataUrl = await flattenToBase64();
    const a = document.createElement('a');
    a.download = 'sbg-photo-' + Date.now() + '.png';
    a.href = dataUrl;
    a.click();
  });

  function drawImg(ctx, src, x, y, w, h) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => { ctx.drawImage(img, x, y, w, h); resolve(); };
      img.onerror = () => resolve();
      img.src = src;
    });
  }

  /* ===== FLATTEN TO BASE64 (shared by download + email) ====== */
  async function flattenToBase64() {
    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;
    const out = document.createElement('canvas');
    out.width = stageW; out.height = stageH;
    const ctx = out.getContext('2d');
    ctx.drawImage(photoCanvas, 0, 0, stageW, stageH);
    if (toggleFrame.checked) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 4;
      ctx.strokeRect(4, 4, stageW - 8, stageH - 8);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(stageW * 0.04)}px "Segoe UI", Arial, sans-serif`;
      ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0,0,0,.7)'; ctx.shadowBlur = 6;
      ctx.fillText('AWS Student Builder Group', stageW / 2, Math.round(stageH * 0.06));
      ctx.shadowBlur = 0;
      await drawImg(ctx, 'https://i.ibb.co/zht0VtMS/AWS-Student-Builder-Group-RGB-Program-Icon-White.png', 14, stageH - 56, 44, 44);
    }
    const stageRect = stage.getBoundingClientRect();
    for (const s of stage.querySelectorAll('.placed-sticker')) {
      const r = s.getBoundingClientRect();
      await drawImg(ctx, s.querySelector('img').src, r.left - stageRect.left, r.top - stageRect.top, r.width, r.height);
    }
    await drawImg(ctx, 'https://i.ibb.co/Ng3GhCf7/AWS-smile-RGB-WHT.png', stageW - 110, stageH - 54, 96, 40);
    return out.toDataURL('image/png');
  }
  </script>

  <!-- ── EMAIL MODAL ────────────────────────────────────────────── -->
  <div class="modal-overlay" id="email-modal">
    <div class="modal">
      <button class="modal-close" id="modal-close-btn" aria-label="Cerrar">×</button>
      <h2>📧 Enviar tu foto</h2>
      <p>Ingresa tu nombre y correo para recibir la foto del evento.</p>
      <label for="input-name">Nombre</label>
      <input type="text" id="input-name" placeholder="Tu nombre completo" autocomplete="name" />
      <label for="input-email">Correo electrónico</label>
      <input type="email" id="input-email" placeholder="tuemail@ejemplo.com" autocomplete="email" />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel-btn">Cancelar</button>
        <button class="btn btn-send" id="modal-submit-btn">Enviar foto 🚀</button>
      </div>
      <div class="send-status" id="send-status"></div>
    </div>
  </div>

  <script>
  /* ===== LAMBDA URL – ya no se usa, EmailJS maneja el envío ===== */
  const LAMBDA_URL = "";
  /* =============================================================== */

  const emailModal     = document.getElementById('email-modal');
  const modalCloseBtn  = document.getElementById('modal-close-btn');
  const modalCancelBtn = document.getElementById('modal-cancel-btn');
  const modalSubmitBtn = document.getElementById('modal-submit-btn');
  const sendStatus     = document.getElementById('send-status');
  const inputName      = document.getElementById('input-name');
  const inputEmail     = document.getElementById('input-email');
  const btnSend        = document.getElementById('btn-send');

  // Abrir modal
  btnSend.addEventListener('click', () => {
    sendStatus.textContent = '';
    sendStatus.className = 'send-status';
    emailModal.classList.add('active');
    inputName.focus();
  });

  // Cerrar modal
  [modalCloseBtn, modalCancelBtn].forEach(b => {
    b.addEventListener('click', () => emailModal.classList.remove('active'));
  });
  emailModal.addEventListener('click', (e) => {
    if (e.target === emailModal) emailModal.classList.remove('active');
  });

  // Enviar foto por correo con EmailJS
  modalSubmitBtn.addEventListener('click', async () => {
    const name  = inputName.value.trim();
    const email = inputEmail.value.trim();
    if (!name)  { showStatus('Por favor ingresa tu nombre.', false); return; }
    if (!email || !email.includes('@')) {
      showStatus('Por favor ingresa un correo válido.', false); return;
    }
    modalSubmitBtn.disabled = true;
    modalSubmitBtn.textContent = 'Enviando…';
    showStatus('', false);
    try {
      const photoDataUrl = await flattenToBase64();

      // Comprimir foto para EmailJS (max 50KB)
      const compressed = await compressPhoto(photoDataUrl, 400, 0.5);

      await emailjs.send(
        'service_hg64jir',
        'template_3h0mf5w',
        {
          to_name:   name,
          to_email:  email,
          from_name: 'AWS Student Builder Group',
          message:   `Hola ${name}, Futuro Builder Member 💜\n\n¡Esta es tu foto del evento! ¡Saliste muy Guap@! 📸\n\nEsperamos que te unas a nuestra comunidad y juntos sigamos dando el siguiente paso: de aprender… a construir. AWS Student Builder Groups 💜`,
          photo_url: compressed,
        }
      );

      showStatus('¡Foto enviada! Revisa tu correo 💜', true);
      setTimeout(() => emailModal.classList.remove('active'), 3000);
    } catch (err) {
      console.error('EmailJS error:', err);
      showStatus('Error al enviar: ' + (err.text || err.message || 'Intenta de nuevo.'), false);
    } finally {
      modalSubmitBtn.disabled = false;
      modalSubmitBtn.textContent = 'Enviar foto 🚀';
    }
  });

  function showStatus(msg, ok) {
    sendStatus.textContent = msg;
    sendStatus.className = 'send-status ' + (ok ? 'ok' : 'err');
  }

  // Comprime la foto a maxSize px y calidad q para EmailJS
  function compressPhoto(dataUrl, maxSize, quality) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
        canvas.width  = Math.round(img.width  * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = dataUrl;
    });
  }

  // Habilitar/deshabilitar botón enviar junto con descargar
  document.getElementById('btn-snap').addEventListener('click', () => {
    setTimeout(() => { document.getElementById('btn-send').disabled = false; }, 150);
  });
  document.getElementById('btn-retake').addEventListener('click', () => {
    document.getElementById('btn-send').disabled = true;
  });
  </script>
